name: websphere-innovations
services:
  - name: websphere-innovations
    source_dir: /
    github:
      repo: WebSphereInnovations/WebSphereInnovations
      branch: master
      deploy_on_push: true
    instance_type: nano
    ports:
      - port: 5000
        protocol: http
    env:
      - key: PORT
        value: 5000
    build_command: pip install -r requirements.txt
    run_command: gunicorn --bind :$PORT app:app
